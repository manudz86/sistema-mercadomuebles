<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#F3F4F6"/>
  <!-- colchon body -->
  <rect x="60" y="100" width="280" height="120" rx="18" fill="#E5E7EB"/>
  <rect x="60" y="100" width="280" height="120" rx="18" stroke="#D1D5DB" stroke-width="2"/>
  <!-- pillow top -->
  <rect x="80" y="90" width="240" height="30" rx="10" fill="#D1D5DB"/>
  <!-- quilting lines horizontal -->
  <line x1="80" y1="133" x2="320" y2="133" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="8,6"/>
  <line x1="80" y1="155" x2="320" y2="155" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="8,6"/>
  <line x1="80" y1="177" x2="320" y2="177" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="8,6"/>
  <!-- patas -->
  <rect x="90"  y="218" width="18" height="20" rx="4" fill="#D1D5DB"/>
  <rect x="292" y="218" width="18" height="20" rx="4" fill="#D1D5DB"/>
  <!-- texto -->
  <text x="200" y="264" text-anchor="middle" font-family="DM Sans, sans-serif" font-size="13" fill="#9CA3AF">Foto próximamente</text>
</svg>
