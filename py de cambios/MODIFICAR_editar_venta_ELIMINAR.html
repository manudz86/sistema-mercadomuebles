    <!-- BOTONES -->
    <div class="d-flex justify-content-between align-items-center">
        <div class="d-flex gap-2">
            <a href="{{ url_for('ventas_activas') }}" class="btn btn-secondary btn-lg">
                <i class="bi bi-x-circle"></i> Cancelar
            </a>
            <button type="button" class="btn btn-danger btn-lg" data-bs-toggle="modal" data-bs-target="#modalEliminarVenta">
                <i class="bi bi-trash"></i> Eliminar Venta

<!-- MODAL DE CONFIRMACIÓN - ELIMINAR VENTA -->
<div class="modal fade" id="modalEliminarVenta" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-danger">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">
                    <i class="bi bi-exclamation-triangle-fill"></i> ⚠️ Eliminar Venta
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-warning">
                    <strong>⚠️ ADVERTENCIA:</strong> Esta acción NO se puede deshacer.
                </div>
                
                <p>¿Estás seguro que querés <strong>ELIMINAR COMPLETAMENTE</strong> la venta <strong>{{ venta.numero_venta }}</strong>?</p>
                
                <div class="alert alert-info mb-0">
                    <i class="bi bi-info-circle"></i> 
                    La venta se borrará de la base de datos y <strong>NO se descontará stock</strong>.
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="bi bi-x-circle"></i> Cancelar
                </button>
                <form method="POST" action="{{ url_for('eliminar_venta', venta_id=venta.id) }}" style="display: inline;">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash-fill"></i> SÍ, Eliminar Venta
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
