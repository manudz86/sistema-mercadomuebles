{% extends 'tienda/base.html' %}

{% block titulo %}Pago en proceso — Mercadomuebles{% endblock %}

{% block contenido %}
<div style="max-width:520px; margin:60px auto; padding:0 16px; text-align:center;">
  <div style="background:#fff; border:2px solid #f0a500; border-radius:16px; padding:48px 36px;">

    <div id="icono-pendiente" style="font-size:3.5rem; margin-bottom:20px;">⏳</div>
    <div id="icono-ok" style="font-size:3.5rem; margin-bottom:20px; display:none;">✅</div>

    <h2 id="titulo" style="font-size:1.5rem; font-weight:800; color:#1a1a2e; margin-bottom:12px;">
      Procesando tu pago…
    </h2>
    <p id="subtitulo" style="color:#666; font-size:0.95rem; line-height:1.5;">
      Tu pago está siendo procesado por Mercado Pago.<br>
      Esta página se actualiza automáticamente.
    </p>

    <div id="spinner" style="margin:24px auto; width:36px; height:36px; border:4px solid #eee;
         border-top-color:#f0a500; border-radius:50%; animation:spin 0.8s linear infinite;"></div>

    <p id="contador" style="color:#aaa; font-size:0.82rem; margin-top:0;">Verificando en <span id="seg">5</span>s…</p>

    <a href="{{ url_for('tienda.home') }}" id="btn-inicio"
       style="display:none; margin-top:20px; padding:12px 28px; background:#1a1a2e; color:#fff;
              border-radius:8px; text-decoration:none; font-weight:700; font-size:0.95rem;">
      Ir al inicio
    </a>
  </div>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
const paymentId = "{{ payment_id }}";
let segundos = 5;

{% if payment_id %}
function verificar() {
  fetch('/tienda/verificar-pago?payment_id=' + paymentId)
    .then(r => r.json())
    .then(data => {
      if (data.status === 'approved') {
        // Redirigir a éxito
        window.location.href = '/tienda/pago/exito?payment_id=' + paymentId + '&status=approved';
      } else if (data.status === 'rejected' || data.status === 'cancelled') {
        window.location.href = '/tienda/pago/error?payment_id=' + paymentId;
      } else {
        // Sigue en proceso, contar y reintentar
        segundos = 5;
        countdown();
      }
    })
    .catch(() => { setTimeout(verificar, 5000); });
}

function countdown() {
  const el = document.getElementById('seg');
  if (!el) return;
  el.textContent = segundos;
  if (segundos <= 0) {
    verificar();
  } else {
    segundos--;
    setTimeout(countdown, 1000);
  }
}

// Arrancar
setTimeout(countdown, 500);
{% else %}
// Sin payment_id: mostrar solo página informativa
document.getElementById('spinner').style.display = 'none';
document.getElementById('contador').style.display = 'none';
document.getElementById('btn-inicio').style.display = 'inline-block';
{% endif %}
</script>
{% endblock %}
