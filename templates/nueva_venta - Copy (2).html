{% extends "base.html" %}

{% block title %}Nueva Venta - Mercadomuebles{% endblock %}

{% block content %}
<div class="card" style="max-width: 1400px; margin: 0 auto;">
    <div class="card-header" style="background: linear-gradient(135deg, #28a745 0%, #20c997 100%); color: white;">
        <h3 class="mb-0"><i class="bi bi-plus-circle"></i> Nueva Venta</h3>
    </div>
    
    <div class="card-body">
        <form method="POST" action="/nueva-venta/guardar" id="formVenta">
            
            <!-- DATOS GENERALES -->
            <div class="row mb-4">
                <div class="col-12">
                    <h5 class="border-bottom pb-2 mb-3"><i class="bi bi-person"></i> Datos Generales</h5>
                </div>
                
                <div class="col-md-3">
                    <label class="form-label fw-bold">Número Interno</label>
                    <input type="text" class="form-control bg-light" name="numero_venta" value="{{ siguiente_numero }}" readonly>
                    <small class="text-muted">Generado automáticamente</small>
                </div>
                
                <div class="col-md-3">
                    <label class="form-label fw-bold">Fecha *</label>
                    <input type="date" class="form-control" name="fecha_venta" value="{{ fecha_hoy }}" required>
                </div>
                
                <div class="col-md-3">
                    <label class="form-label fw-bold">Canal *</label>
                    <select class="form-select" name="canal" required>
                        <option value="Mercado Libre">Mercado Libre</option>
                        <option value="Fuera de ML">Fuera de ML</option>
                    </select>
                </div>
                
                <div class="col-md-3">
                    <label class="form-label fw-bold">Apodo ML</label>
                    <input type="text" class="form-control" name="mla_code" placeholder="Apodo de Mercadolibre">
                </div>
                
                <div class="col-md-6">
                    <label class="form-label fw-bold">Nombre Cliente</label>
                    <input type="text" class="form-control" name="nombre_cliente" placeholder="Opcional">
                </div>
                
                <div class="col-md-3">
                    <label class="form-label fw-bold">Teléfono</label>
                    <input type="text" class="form-control" name="telefono_cliente" placeholder="Ej: 154-412-1051">
                </div>
                
                <div class="col-md-3">
                    <label class="form-label fw-bold">DNI/CUIT</label>
                    <input type="text" class="form-control" name="dni_cliente" placeholder="Ej: 12345678">
                </div>
                
                <div class="col-md-6">
                    <label class="form-label fw-bold">Provincia</label>
                    <select class="form-select" name="provincia_cliente">
                        <option value="Capital Federal" selected>Capital Federal</option>
                        <option value="Buenos Aires">Buenos Aires</option>
                        <option value="Catamarca">Catamarca</option>
                        <option value="Chaco">Chaco</option>
                        <option value="Chubut">Chubut</option>
                        <option value="Córdoba">Córdoba</option>
                        <option value="Corrientes">Corrientes</option>
                        <option value="Entre Ríos">Entre Ríos</option>
                        <option value="Formosa">Formosa</option>
                        <option value="Jujuy">Jujuy</option>
                        <option value="La Pampa">La Pampa</option>
                        <option value="La Rioja">La Rioja</option>
                        <option value="Mendoza">Mendoza</option>
                        <option value="Misiones">Misiones</option>
                        <option value="Neuquén">Neuquén</option>
                        <option value="Río Negro">Río Negro</option>
                        <option value="Salta">Salta</option>
                        <option value="San Juan">San Juan</option>
                        <option value="San Luis">San Luis</option>
                        <option value="Santa Cruz">Santa Cruz</option>
                        <option value="Santa Fe">Santa Fe</option>
                        <option value="Santiago del Estero">Santiago del Estero</option>
                        <option value="Tierra del Fuego">Tierra del Fuego</option>
                        <option value="Tucumán">Tucumán</option>
                    </select>
                </div>
            </div>

            
            <!-- PRODUCTOS -->
            <div class="row mb-4">
                <div class="col-12">
                    <h5 class="border-bottom pb-2 mb-3"><i class="bi bi-cart"></i> Productos</h5>
                </div>
                
                <div class="col-12 mb-3">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" 
                               class="form-control" 
                               id="buscarProducto" 
                               placeholder="Buscar por SKU o nombre (Ej: CEX140, Doral, Almohada...)" 
                               oninput="buscarProductoTiempoReal()">
                    </div>
                    <div id="resultadosBusqueda" class="mt-2"></div>
                </div>
                
                <div class="col-12">
                    <table class="table table-bordered" id="tablaProductos">
                        <thead class="table-success">
                            <tr>
                                <th width="15%">SKU</th>
                                <th width="28%">Producto</th>
                                <th width="9%">Stock Físico</th>
                                <th width="9%">Disponible</th>
                                <th width="8%">Cantidad</th>
                                <th width="12%">Precio Unit.</th>
                                <th width="12%">Subtotal</th>
                                <th width="3%"></th>
                            </tr>
                        </thead>
                        <tbody id="productosSeleccionados">
                            <!-- Los productos se agregan aquí dinámicamente -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- ENTREGA -->
            <div class="row mb-4">
                <div class="col-12">
                    <h5 class="border-bottom pb-2 mb-3"><i class="bi bi-truck"></i> Entrega</h5>
                </div>
                
                <div class="col-md-3">
                    <label class="form-label fw-bold">Tipo de Entrega *</label>
                    <select class="form-select" name="tipo_entrega" id="tipoEntrega" required onchange="toggleEntrega()">
                        <option value="">Seleccionar...</option>
                        <option value="Retiro">Retiro en local</option>
                        <option value="Envío">Envío a domicilio</option>
                    </select>
                </div>
                
                <div class="col-md-9" id="camposEnvio" style="display: none;">
                    <div class="row">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Tipo de Flete *</label>
                            <select class="form-select" name="metodo_envio" id="metodoEnvio" onchange="toggleMetodoEnvio()">
                                <option value="">Seleccionar...</option>
                                <option value="Mercadoenvios">Mercadoenvios</option>
                                <option value="Flex">Flex</option>
                                <option value="Full">Full (Depósito ML)</option>
                                <option value="Delega">Delega</option>
                                <option value="Zippin">Zippin</option>
                                <option value="Flete Propio">Flete Propio</option>
                            </select>
                            <small class="text-muted" id="notaUbicacion"></small>
                        </div>
                        
                        <div class="col-md-4" id="campoZona" style="display: none;">
                            <label class="form-label fw-bold">Zona *</label>
                            <select class="form-select" name="zona_envio" id="zonaEnvio">
                                <option value="">Seleccionar zona...</option>
                                <option value="Capital">Capital</option>
                                <option value="Sur">Sur</option>
                                <option value="Norte-Noroeste">Norte-Noroeste</option>
                                <option value="Oeste">Oeste</option>
                            </select>
                        </div>
                        
                        <div class="col-md-4" id="campoDireccion">
                            <label class="form-label fw-bold">Dirección de Envío</label>
                            <input type="text" class="form-control" name="direccion_entrega" id="direccionEntrega" placeholder="Puede completarse después">
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-3">
                    <label class="form-label fw-bold">Costo Flete</label>
                    <input type="number" class="form-control" name="costo_flete" id="costoFlete" value="0" step="0.01">
                </div>
            </div>
            
            <!-- PAGO -->
            <div class="row mb-4">
                <div class="col-12">
                    <h5 class="border-bottom pb-2 mb-3"><i class="bi bi-cash-coin"></i> Pago</h5>
                </div>
                
                <div class="col-md-3">
                    <label class="form-label fw-bold">Total Productos</label>
                    <input type="text" class="form-control bg-light" id="totalProductos" readonly value="$0">
                </div>
                
                <div class="col-md-3">
                    <label class="form-label fw-bold">Costo Flete</label>
                    <input type="text" class="form-control bg-light" id="mostrarFlete" readonly value="$0">
                </div>
                
                <div class="col-md-3">
                    <label class="form-label fw-bold">TOTAL</label>
                    <input type="text" class="form-control bg-warning fw-bold" id="totalFinal" readonly value="$0" style="font-size: 1.2em;">
                    <input type="hidden" name="importe_total" id="importeTotal" value="0">
                </div>
                
                <div class="col-md-3">
                    <label class="form-label fw-bold">Método de Pago</label>
                    <select class="form-select" name="metodo_pago" required>
                        <option value="">Seleccionar...</option>
                        <option value="MercadoPago">MercadoPago</option>
                        <option value="Efectivo">Efectivo</option>
                        <option value="Transferencia">Transferencia</option>
                        <option value="Mixto">Mixto</option>
                    </select>
                </div>
                
                <div class="col-md-4">
                    <label class="form-label fw-bold">Pago MercadoPago</label>
                    <input type="number" class="form-control" name="pago_mercadopago" id="pagoMP" value="0" step="0.01" onchange="calcularSaldo()">
                </div>
                
                <div class="col-md-4">
                    <label class="form-label fw-bold">Pago Efectivo/Transferencia</label>
                    <input type="number" class="form-control" name="pago_efectivo" id="pagoEfectivo" value="0" step="0.01" onchange="calcularSaldo()">
                </div>
                
                <div class="col-md-4">
                    <label class="form-label fw-bold">Saldo Pendiente</label>
                    <input type="text" class="form-control" id="saldoPendiente" readonly value="$0" style="font-weight: bold; color: red;">
                    <input type="hidden" name="importe_abonado" id="importeAbonado" value="0">
                </div>
            </div>
            
            <!-- OBSERVACIONES -->
            <div class="row mb-4">
                <div class="col-12">
                    <label class="form-label fw-bold">Observaciones</label>
                    <textarea class="form-control" name="notas" rows="2" placeholder="Notas adicionales..."></textarea>
                </div>
            </div>
            
            <!-- BOTONES -->
            <div class="row">
                <div class="col-12 text-end">
                    <a href="/" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-success btn-lg">
                        <i class="bi bi-save"></i> Guardar Venta
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<style>
.stock-warning {
    color: #dc3545;
    font-weight: bold;
}
.stock-ok {
    color: #28a745;
    font-weight: bold;
}
.stock-bajo {
    color: #ffc107;
    font-weight: bold;
}
</style>

<script>
let productos = {{ productos_json|safe }};
let productosSeleccionados = [];
let timeoutBusqueda = null;

// Búsqueda en tiempo real
function buscarProductoTiempoReal() {
    // Cancelar búsqueda anterior si existe
    if (timeoutBusqueda) {
        clearTimeout(timeoutBusqueda);
    }
    
    // Esperar 300ms después de que el usuario deje de tipear
    timeoutBusqueda = setTimeout(() => {
        buscarProducto();
    }, 300);
}

function buscarProducto() {
    const busqueda = document.getElementById('buscarProducto').value.toLowerCase().trim();
    const resultados = document.getElementById('resultadosBusqueda');
    
    if (busqueda.length < 2) {
        resultados.innerHTML = '';
        return;
    }
    
    // Buscar en SKU y nombre
    const coincidencias = productos.filter(p => {
        const sku = (p.sku || '').toLowerCase();
        const nombre = (p.nombre || '').toLowerCase();
        return sku.includes(busqueda) || nombre.includes(busqueda);
    });
    
    if (coincidencias.length === 0) {
        resultados.innerHTML = '<div class="alert alert-warning">No se encontraron productos</div>';
        return;
    }
    
    let html = '<div class="list-group">';
    coincidencias.slice(0, 20).forEach(p => {
        const disponible = p.stock_disponible || 0;
        let stockClass = '';
        let stockText = '';
        
        if (disponible > 5) {
            stockClass = 'stock-ok';
            stockText = `Disponible: ${disponible}`;
        } else if (disponible > 0) {
            stockClass = 'stock-bajo';
            stockText = `⚠️ Disponible: ${disponible}`;
        } else {
            stockClass = 'stock-warning';
            stockText = `⚠️ SIN STOCK (Físico: ${p.stock || 0})`;
        }
        
        html += `
            <a href="#" class="list-group-item list-group-item-action" onclick="agregarProducto('${p.sku}'); return false;">
                <div class="d-flex justify-content-between">
                    <div>
                        <strong>${p.sku}</strong> - ${p.nombre} 
                        <span class="badge bg-secondary">${p.tipo}</span>
                    </div>
                    <div class="${stockClass}">
                        ${stockText}
                    </div>
                </div>
            </a>
        `;
    });
    html += '</div>';
    resultados.innerHTML = html;
}

function agregarProducto(sku) {
    const producto = productos.find(p => p.sku === sku);
    if (!producto) return;
    
    // Verificar si ya está agregado
    if (productosSeleccionados.find(p => p.sku === sku)) {
        alert('Este producto ya está agregado');
        return;
    }
    
    productosSeleccionados.push({...producto, cantidad: 1});
    actualizarTablaProductos();
    document.getElementById('buscarProducto').value = '';
    document.getElementById('resultadosBusqueda').innerHTML = '';
}

function actualizarTablaProductos() {
    const tbody = document.getElementById('productosSeleccionados');
    let html = '';
    
    productosSeleccionados.forEach((p, index) => {
        const subtotal = p.cantidad * p.precio;
        const disponible = p.stock_disponible || 0;
        
        let stockClass = '';
        let advertencia = '';
        
        if (disponible <= 0) {
            stockClass = 'stock-warning';
            advertencia = '<br><small class="stock-warning">⚠️ Sin stock disponible</small>';
        } else if (p.cantidad > disponible) {
            stockClass = 'stock-warning';
            advertencia = `<br><small class="stock-warning">⚠️ Sobrepasa disponible (${disponible})</small>`;
        } else if (disponible <= 3) {
            stockClass = 'stock-bajo';
        } else {
            stockClass = 'stock-ok';
        }
        
        html += `
            <tr>
                <td>
                    ${p.sku}
                    <input type="hidden" name="productos[${index}][sku]" value="${p.sku}">
                </td>
                <td>
                    ${p.nombre}
                    ${advertencia}
                </td>
                <td class="text-center">${p.stock || 0}</td>
                <td class="text-center ${stockClass}">${disponible}</td>
                <td>
                    <input type="number" class="form-control form-control-sm" 
                           name="productos[${index}][cantidad]" 
                           value="${p.cantidad}" 
                           min="1" 
                           onchange="actualizarCantidad(${index}, this.value)">
                </td>
                <td>
                    <input type="number" class="form-control form-control-sm" 
                           name="productos[${index}][precio]" 
                           value="${p.precio}" 
                           step="0.01" 
                           onchange="actualizarPrecio(${index}, this.value)">
                </td>
                <td class="text-end fw-bold">$${formatearNumero(subtotal)}</td>
                <td class="text-center">
                    <button type="button" class="btn btn-sm btn-danger" onclick="eliminarProducto(${index})">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
        `;
    });
    
    tbody.innerHTML = html || '<tr><td colspan="8" class="text-center text-muted">No hay productos agregados</td></tr>';
    calcularTotales();
}

function actualizarCantidad(index, cantidad) {
    productosSeleccionados[index].cantidad = parseInt(cantidad);
    actualizarTablaProductos();
}

function actualizarPrecio(index, precio) {
    productosSeleccionados[index].precio = parseFloat(precio);
    actualizarTablaProductos();
}

function eliminarProducto(index) {
    productosSeleccionados.splice(index, 1);
    actualizarTablaProductos();
}

function calcularTotales() {
    const totalProductos = productosSeleccionados.reduce((sum, p) => sum + (p.cantidad * p.precio), 0);
    const costoFlete = parseFloat(document.getElementById('costoFlete').value) || 0;
    const totalFinal = totalProductos + costoFlete;
    
    document.getElementById('totalProductos').value = '$' + formatearNumero(totalProductos);
    document.getElementById('mostrarFlete').value = '$' + formatearNumero(costoFlete);
    document.getElementById('totalFinal').value = '$' + formatearNumero(totalFinal);
    document.getElementById('importeTotal').value = totalFinal;
    
    calcularSaldo();
}

function calcularSaldo() {
    const total = parseFloat(document.getElementById('importeTotal').value) || 0;
    const pagoMP = parseFloat(document.getElementById('pagoMP').value) || 0;
    const pagoEfectivo = parseFloat(document.getElementById('pagoEfectivo').value) || 0;
    const pagado = pagoMP + pagoEfectivo;
    const saldo = total - pagado;
    
    document.getElementById('saldoPendiente').value = '$' + formatearNumero(saldo);
    document.getElementById('saldoPendiente').style.color = saldo > 0 ? 'red' : 'green';
    document.getElementById('importeAbonado').value = pagado;
}

function toggleEntrega() {
    const tipo = document.getElementById('tipoEntrega').value;
    const camposEnvio = document.getElementById('camposEnvio');
    
    if (tipo === 'Envío') {
        camposEnvio.style.display = 'block';
    } else {
        camposEnvio.style.display = 'none';
    }
}

function toggleMetodoEnvio() {
    const metodo = document.getElementById('metodoEnvio').value;
    const notaUbicacion = document.getElementById('notaUbicacion');
    const campoZona = document.getElementById('campoZona');
    const campoDireccion = document.getElementById('campoDireccion');
    
    // Mostrar indicador de ubicación
    if (metodo === 'Full') {
        notaUbicacion.innerHTML = '🔶 Se despachará desde <strong>FULL ML</strong>';
        notaUbicacion.style.display = 'block';
        notaUbicacion.style.color = '#e67e22';
        campoZona.style.display = 'none';
        campoDireccion.className = 'col-md-8';
    } else if (metodo === 'Flete Propio') {
        notaUbicacion.innerHTML = '🔷 Se despachará desde <strong>Depósito</strong>';
        notaUbicacion.style.display = 'block';
        notaUbicacion.style.color = '#2c3e50';
        campoZona.style.display = 'block';
        campoDireccion.className = 'col-md-4';
    } else if (metodo) {
        notaUbicacion.innerHTML = '🔷 Se despachará desde <strong>Depósito</strong>';
        notaUbicacion.style.display = 'block';
        notaUbicacion.style.color = '#2c3e50';
        campoZona.style.display = 'none';
        campoDireccion.className = 'col-md-8';
    } else {
        notaUbicacion.style.display = 'none';
        campoZona.style.display = 'none';
        campoDireccion.className = 'col-md-8';
    }
}

function formatearNumero(numero) {
    return new Intl.NumberFormat('es-AR').format(numero);
}

// Recalcular al cambiar costo flete
document.getElementById('costoFlete').addEventListener('input', calcularTotales);

// Validar form antes de enviar
document.getElementById('formVenta').addEventListener('submit', function(e) {
    if (productosSeleccionados.length === 0) {
        e.preventDefault();
        alert('Debe agregar al menos un producto');
        return false;
    }
    
    // Advertir si hay productos sin stock
    let sinStock = productosSeleccionados.filter(p => (p.stock_disponible || 0) <= 0);
    if (sinStock.length > 0) {
        const confirmar = confirm(
            `⚠️ ADVERTENCIA:\n\n` +
            `${sinStock.length} producto(s) sin stock disponible.\n\n` +
            `¿Desea continuar de todas formas?`
        );
        if (!confirmar) {
            e.preventDefault();
            return false;
        }
    }
});
</script>
{% endblock %}
